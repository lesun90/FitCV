services:
  app:
    build:
      context: .
    command: npm run dev
    environment:
      FITCV_HOST: 0.0.0.0
      FITCV_PORT: ${FITCV_PORT:-1512}
      FITCV_USE_POLLING: ${FITCV_USE_POLLING:-true}
    ports:
      - "${FITCV_PORT:-1512}:${FITCV_PORT:-1512}"
    volumes:
      - .:/app
      - fitcv_node_modules:/app/node_modules
      - fitcv_busytex:/app/public/core/busytex

volumes:
  fitcv_node_modules:
  fitcv_busytex:
